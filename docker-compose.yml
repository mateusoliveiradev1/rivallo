services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${RIVALLO_POSTGRES_DB:-rivallo_dev}
      POSTGRES_USER: ${RIVALLO_POSTGRES_USER:-rivallo}
      POSTGRES_PASSWORD: ${RIVALLO_POSTGRES_PASSWORD:-rivallo_local}
    ports:
      - '127.0.0.1:${RIVALLO_POSTGRES_PORT:-5432}:5432'
    volumes:
      - rivallo-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

volumes:
  rivallo-postgres-data:
